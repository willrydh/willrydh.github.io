<!doctype html>
<html lang="sv" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#050505" />
  <title>AI Playlist Radio — Animated Logo</title>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
  <style>
    :root{--bg:#050505;--fg:#f7f7f5;--muted:#8f8f94;--line:#242428;--red:#ed1b2f;--panel:#0b0b0d}
    html[data-theme="light"]{--bg:#f7f7f4;--fg:#0b0b0d;--muted:#626267;--line:#d9d9dc;--panel:#fff}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;background:var(--bg);color:var(--fg);font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;transition:background .35s,color .35s}
    main{min-height:100vh;display:grid;place-items:center;padding:32px}.shell{width:min(1120px,100%)}
    .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}.eyebrow{font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted)}
    .controls{display:flex;gap:10px}.btn{appearance:none;border:1px solid var(--line);background:var(--panel);color:var(--fg);border-radius:999px;padding:10px 15px;font:inherit;font-size:13px;cursor:pointer}.btn:hover{border-color:var(--red)}
    .stage{position:relative;overflow:hidden;min-height:420px;border:1px solid var(--line);border-radius:28px;background:radial-gradient(circle at 42% 50%,color-mix(in srgb,var(--red) 7%,transparent),transparent 44%),var(--panel);display:grid;place-items:center;padding:48px}
    .logo{width:min(900px,100%);overflow:visible;color:var(--fg)}
    .arc{fill:none;stroke:var(--red);stroke-width:8;stroke-linecap:round;stroke-dasharray:520;stroke-dashoffset:520}
    .trail{fill:none;stroke:var(--red);stroke-width:5;stroke-linecap:round;opacity:0;filter:url(#glow)}
    .dot{fill:var(--red);filter:url(#glow);opacity:0}
    .apr,.divider,.wordmark{opacity:0}.apr{transform-origin:250px 120px;transform:translateY(8px) scale(.965)}.divider{stroke:currentColor;stroke-width:1;opacity:0}.wordmark{transform:translateX(-14px)}
    .aprText{font-family:Arial,Helvetica,sans-serif;font-size:112px;font-weight:300;letter-spacing:-12px;fill:currentColor}.aprR{fill:var(--red)}
    .brandText{font-family:Arial,Helvetica,sans-serif;font-size:26px;font-weight:400;letter-spacing:11px;fill:currentColor}.brandRed{fill:var(--red)}
    .logo.play .arc{animation:draw 1.35s cubic-bezier(.22,.75,.22,1) .15s forwards}.logo.play .trail{animation:trailIn 1.35s ease .12s forwards}.logo.play .dot{animation:dotIn .1s linear .12s forwards,dotSettle .35s cubic-bezier(.2,.9,.2,1) 1.35s forwards}.logo.play .apr{animation:markIn .72s cubic-bezier(.2,.8,.2,1) .95s forwards}.logo.play .divider{animation:fade .4s ease 1.42s forwards}.logo.play .wordmark{animation:nameIn .62s cubic-bezier(.2,.8,.2,1) 1.48s forwards}
    @keyframes draw{to{stroke-dashoffset:0}}@keyframes trailIn{0%{opacity:0}12%{opacity:.9}82%{opacity:.5}100%{opacity:0}}@keyframes dotIn{to{opacity:1}}@keyframes dotSettle{55%{transform:scale(1.28)}100%{transform:scale(1)}}@keyframes markIn{to{opacity:1;transform:none}}@keyframes fade{to{opacity:.45}}@keyframes nameIn{to{opacity:1;transform:none}}
    .caption{display:flex;justify-content:space-between;gap:24px;margin-top:18px;color:var(--muted);font-size:13px}.caption strong{color:var(--fg);font-weight:500}
    @media(max-width:700px){main{padding:16px}.stage{min-height:300px;padding:22px;border-radius:20px}.caption{display:block;line-height:1.7}.topbar{align-items:flex-start;gap:20px}.controls{flex-wrap:wrap;justify-content:flex-end}.brandText{font-size:28px}}
    @media(prefers-reduced-motion:reduce){.arc{stroke-dashoffset:0}.apr,.wordmark{opacity:1;transform:none}.divider{opacity:.45}.dot{opacity:1}.trail{display:none}}
  </style>
</head>
<body>
<main><div class="shell">
  <div class="topbar"><div class="eyebrow">AI Playlist Radio · Logo prototype</div><div class="controls"><button class="btn" id="theme">Bright mode</button><button class="btn" id="replay">Spela igen</button></div></div>
  <section class="stage" aria-label="Animerad AI Playlist Radio-logotyp">
    <svg class="logo" id="logo" viewBox="0 0 900 260" role="img" aria-labelledby="title desc">
      <title id="title">AI Playlist Radio</title><desc id="desc">En röd ljuspunkt ritar en båge och avslöjar logotypen.</desc>
      <defs>
        <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <path id="motionPath" d="M 118 211 C 57 152, 66 61, 143 24 C 216 -11, 315 12, 349 69"/>
      </defs>
      <use href="#motionPath" class="arc"/>
      <use href="#motionPath" class="trail"/>
      <circle class="dot" r="10"><animateMotion id="motion" dur="1.35s" begin="indefinite" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines=".22 .75 .22 1"><mpath href="#motionPath"/></animateMotion></circle>
      <g class="apr"><text x="112" y="162" class="aprText">AP<tspan class="aprR">R</tspan></text></g>
      <line class="divider" x1="405" y1="50" x2="405" y2="210"/>
      <g class="wordmark"><text x="450" y="92" class="brandText">AI</text><text x="450" y="144" class="brandText">PLAYLIST</text><text x="450" y="196" class="brandText brandRed">RADIO</text></g>
    </svg>
  </section>
  <div class="caption"><span><strong>Animation:</strong> 2,2 sekunder · SVG · retina-skarp</span><span>Dark mode, bright mode och favicon med röd båge</span></div>
</div></main>
<script>
  const root=document.documentElement, logo=document.getElementById('logo'), motion=document.getElementById('motion');
  const themeBtn=document.getElementById('theme');
  function play(){logo.classList.remove('play');void logo.getBoundingClientRect();logo.classList.add('play');try{motion.beginElement()}catch(e){}}
  document.getElementById('replay').addEventListener('click',play);
  themeBtn.addEventListener('click',()=>{const light=root.dataset.theme==='light';root.dataset.theme=light?'dark':'light';themeBtn.textContent=light?'Bright mode':'Dark mode';document.querySelector('meta[name="theme-color"]').content=light?'#050505':'#f7f7f4'});
  window.addEventListener('load',play);
</script>
</body></html>
